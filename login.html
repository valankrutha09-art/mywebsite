<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
      color: white;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #ff4b8b;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Login Page 🔐</h1>

  <form action="/login" method="POST">
    <input type="text" name="username" placeholder="Enter username"><br>
    <input type="password" name="password" placeholder="Enter password"><br>
    <button type="submit">Login</button>
  </form>

</body>
</html>
<p>Don't have an account?</p>
<a href="/signup" style="color:white;">Signup here</a>P
